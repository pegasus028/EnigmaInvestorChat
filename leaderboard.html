<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Investor's Enigma — Control Room</title>
<style>
  :root {
    --bg: #0b1120;
    --panel: #131c31;
    --panel-2: #1b2742;
    --ink: #e8edf7;
    --muted: #93a0bd;
    --gold: #e9c46a;
    --green: #2dd4bf;
    --line: #26324f;
    --shadow: 0 18px 50px rgba(0,0,0,.45);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: ui-sans-serif, system-ui, "Segoe UI", Roboto, Arial, sans-serif;
    background:
      radial-gradient(1200px 600px at 80% -10%, rgba(233,196,106,.10), transparent),
      radial-gradient(900px 500px at -10% 110%, rgba(45,212,191,.10), transparent),
      var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 28px 20px 60px; }
  header.app {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px; flex-wrap: wrap; margin-bottom: 22px;
  }
  .brand h1 { margin: 0; font-size: 26px; letter-spacing: .3px; }
  .brand .eyebrow {
    text-transform: uppercase; letter-spacing: 3px; font-size: 11px;
    color: var(--gold); margin-bottom: 6px;
  }
  .brand .sub { color: var(--muted); font-size: 13px; margin-top: 4px; }

  .grid { display: grid; grid-template-columns: 320px 1fr; gap: 20px; }
  @media (max-width: 820px) { .grid { grid-template-columns: 1fr; } }

  .card {
    background: linear-gradient(180deg, var(--panel), var(--panel-2));
    border: 1px solid var(--line);
    border-radius: 18px;
    padding: 22px;
    box-shadow: var(--shadow);
  }
  .card h2 {
    margin: 0 0 14px; font-size: 14px; text-transform: uppercase;
    letter-spacing: 2px; color: var(--muted);
  }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 6px; }
  input[type="number"] {
    width: 100%; padding: 12px 14px; border-radius: 12px;
    border: 1px solid var(--line); background: #0e1626; color: var(--ink);
    font-size: 16px; outline: none;
  }
  input:focus { border-color: var(--gold); }

  button {
    cursor: pointer; border: 0; border-radius: 12px; font-weight: 700;
    font-size: 15px; padding: 13px 16px; width: 100%; margin-top: 14px;
    transition: transform .05s ease, filter .15s ease;
  }
  button:active { transform: translateY(1px); }
  .btn-start { background: linear-gradient(135deg, var(--gold), #f4a261); color: #2a1d05; }
  .btn-stop  { background: #2a1730; color: #ffb4c4; border: 1px solid #5a2740; }
  button:disabled { filter: grayscale(.5) brightness(.7); cursor: not-allowed; }

  .timer-box { text-align: center; margin-top: 18px; }
  .timer-label { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); }
  .timer {
    font-variant-numeric: tabular-nums; font-size: 52px; font-weight: 800;
    letter-spacing: 1px; margin-top: 4px;
    color: var(--green);
  }
  .timer.low { color: #ff6b81; animation: pulse 1s infinite; }
  @keyframes pulse { 50% { opacity: .55; } }

  .status-pill {
    display: inline-block; padding: 6px 12px; border-radius: 999px;
    font-size: 12px; font-weight: 700; letter-spacing: .5px;
  }
  .pill-waiting { background: #2c2410; color: var(--gold); }
  .pill-active  { background: #0d2e2a; color: var(--green); }

  /* Leaderboard */
  .lb-row {
    display: grid; grid-template-columns: 56px 1fr auto; align-items: center;
    gap: 12px; padding: 14px 16px; border-radius: 14px; margin-bottom: 10px;
    background: #0e1626; border: 1px solid var(--line);
    animation: slideIn .25s ease;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(6px); } }
  .rank {
    width: 40px; height: 40px; border-radius: 10px; display: grid; place-items: center;
    font-weight: 800; font-size: 16px; background: #1a2540; color: var(--muted);
  }
  .lb-row.top1 { border-color: var(--gold); box-shadow: inset 0 0 0 1px rgba(233,196,106,.35); }
  .lb-row.top1 .rank { background: linear-gradient(135deg,var(--gold),#f4a261); color:#2a1d05; }
  .lb-row.top2 .rank { background: #c9d3e6; color:#1b2742; }
  .lb-row.top3 .rank { background: #c98a4b; color:#2a1d05; }
  .lb-name { font-weight: 700; font-size: 16px; }
  .lb-val {
    font-variant-numeric: tabular-nums; font-weight: 800; font-size: 18px;
    color: var(--gold);
  }
  .empty { color: var(--muted); text-align: center; padding: 30px 0; font-size: 14px; }
  .foot { color: var(--muted); font-size: 12px; margin-top: 18px; text-align:center; }
  .err { color:#ff8aa0; font-size:13px; margin-top:10px; min-height:16px; }
</style>
</head>
<body>
<div class="wrap">
  <header class="app">
    <div class="brand">
      <div class="eyebrow">Satriwithaya · English Program</div>
      <h1>The Investor's Enigma</h1>
      <div class="sub">Lead Investor Control Room — start the round, run the clock, watch valuations climb.</div>
    </div>
    <div id="statusPill" class="status-pill pill-waiting">● Market Closed</div>
  </header>

  <div class="grid">
    <!-- Control panel -->
    <section class="card">
      <h2>Round Controls</h2>
      <label for="durationInput">Game Duration (minutes)</label>
      <input id="durationInput" type="number" min="1" max="60" value="10" />
      <button id="startBtn" class="btn-start" onclick="startGame()">▶ Start Game</button>
      <button id="stopBtn" class="btn-stop" onclick="stopGame()">■ Close Market</button>

      <div class="timer-box">
        <div class="timer-label">Time Remaining</div>
        <div id="timer" class="timer">--:--</div>
      </div>
      <div id="err" class="err"></div>
    </section>

    <!-- Leaderboard -->
    <section class="card">
      <h2>Live Valuations — Top 30</h2>
      <div id="leaderboard"><div class="empty">No founders have pitched yet.</div></div>
      <div class="foot">Auto-refreshing every 3 seconds.</div>
    </section>
  </div>
</div>

<script>
  /* ===================================================================
   * CONFIG — paste your deployed Apps Script /exec URL here.
   * =================================================================== */
  const API_URL = "https://script.google.com/macros/s/AKfycbzcZSU23i5Bv1P0d9Ydj_cy1VdFgZeYBix9U4-7Qt3jxI2sQEIg8YOjcrD2olUqko0z/exec";

  const $ = (id) => document.getElementById(id);

  function fmtMoney(n) {
    return "$" + (Number(n) || 0).toLocaleString("en-US");
  }
  function fmtTime(secs) {
    secs = Math.max(0, Math.floor(secs));
    const m = Math.floor(secs / 60);
    const s = secs % 60;
    return String(m).padStart(2, "0") + ":" + String(s).padStart(2, "0");
  }

  async function postJSON(payload) {
    // text/plain content type avoids the CORS preflight that Apps Script can't answer.
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      redirect: "follow",
      body: JSON.stringify(payload)
    });
    const text = await res.text();
    try { return JSON.parse(text); }
    catch (e) {
      const a = text.indexOf("{"), b = text.lastIndexOf("}");
      if (a !== -1 && b !== -1) { try { return JSON.parse(text.substring(a, b + 1)); } catch (e2) {} }
      return { ok: true, _softParse: true };
    }
  }

  // Cache-busted GET, tolerant of Apps Script redirect-to-HTML responses.
  async function getJSON(action) {
    const sep = API_URL.indexOf("?") === -1 ? "?" : "&";
    const url = API_URL + sep + "action=" + encodeURIComponent(action) + "&t=" + Date.now();
    const res = await fetch(url, { method: "GET", redirect: "follow" });
    const text = await res.text();
    try { return JSON.parse(text); }
    catch (e) {
      const a = text.indexOf("{"), b = text.lastIndexOf("}");
      if (a !== -1 && b !== -1) return JSON.parse(text.substring(a, b + 1));
      throw new Error("Non-JSON response");
    }
  }

  async function startGame() {
    const mins = parseInt($("durationInput").value, 10);
    if (!mins || mins < 1) { showErr("Enter a duration of at least 1 minute."); return; }
    showErr("");
    $("startBtn").disabled = true;
    try {
      await postJSON({ action: "startGame", minutes: mins });
      await refresh();
    } catch (e) {
      showErr("Could not start the game. Check the API URL / deployment.");
    } finally {
      $("startBtn").disabled = false;
    }
  }

  async function stopGame() {
    showErr("");
    try {
      await postJSON({ action: "stopGame" });
      await refresh();
    } catch (e) {
      showErr("Could not close the market.");
    }
  }

  function showErr(msg) { $("err").textContent = msg; }

  function renderLeaderboard(rows) {
    const box = $("leaderboard");
    if (!rows || !rows.length) {
      box.innerHTML = '<div class="empty">No founders have pitched yet.</div>';
      return;
    }
    box.innerHTML = rows.map((r, i) => {
      const topClass = i === 0 ? "top1" : i === 1 ? "top2" : i === 2 ? "top3" : "";
      const medal = i === 0 ? "🏆" : (i + 1);
      return (
        '<div class="lb-row ' + topClass + '">' +
          '<div class="rank">' + medal + '</div>' +
          '<div class="lb-name">' + escapeHtml(r.name) + '</div>' +
          '<div class="lb-val">' + fmtMoney(r.valuation) + '</div>' +
        '</div>'
      );
    }).join("");
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c =>
      ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
  }

  function setStatus(state, secs) {
    const pill = $("statusPill");
    if (state === "Active") {
      pill.className = "status-pill pill-active";
      pill.textContent = "● Market Open";
    } else {
      pill.className = "status-pill pill-waiting";
      pill.textContent = "● Market Closed";
    }
    const t = $("timer");
    t.textContent = fmtTime(secs);
    t.classList.toggle("low", state === "Active" && secs <= 30);
  }

  async function refresh() {
    try {
      const data = await getJSON("leaderboard");
      if (!data || !data.ok) return;
      setStatus(data.gameState, data.timeRemaining);
      renderLeaderboard(data.leaderboard);
    } catch (e) {
      /* transient network error — keep polling */
    }
  }

  refresh();
  setInterval(refresh, 3000);
</script>
</body>
</html>
